# Mounted as /etc/nginx/conf.d/default.conf in the official nginx image.
#
# Both tiers (web + sync-api) are blue/green now; the active slot for each
# is selected by an `include`d fragment that the deploy script rewrites and
# SIGHUPs. The fragments expose a single variable each:
#
#   active-web.upstream.conf  -> $archon_web_backend       (e.g. "archon-web-green:3000")
#   active-api.upstream.conf  -> $archon_sync_api_backend  (e.g. "archon-sync-api-green:4010")
#
# `proxy_pass http://$var/...` forces nginx to defer DNS to request time
# (via the `resolver` directive below), so the gateway boots even when one
# of the two slots is absent — required for the bootstrap window where the
# inactive color hasn't been built yet.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ""      close;
}

# Reload: docker kill -s HUP archon-gateway (not nginx -s reload; pid file empty under daemon off)

server {
    listen 80;
    resolver 127.0.0.11 valid=10s ipv6=off;
    include /etc/nginx/active-web.upstream.conf;
    include /etc/nginx/active-api.upstream.conf;
    server_name _;

    client_max_body_size 64m;

    # Variable-in-proxy_pass quirk: when `proxy_pass http://$var/path/;`
    # contains both a variable AND a URI, nginx uses the URI literally and
    # does NOT substitute the location-matching prefix from the request.
    # E.g. `proxy_pass http://$backend/api/v1/;` would send literal
    # `/api/v1/` to the upstream regardless of the path the client asked
    # for. To forward the full request URI through, the proxy_pass URI
    # part must be empty when the upstream host is a variable.
    location = /health {
        proxy_pass http://$archon_sync_api_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/v1/ {
        proxy_pass http://$archon_sync_api_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location / {
        proxy_pass http://$archon_web_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
