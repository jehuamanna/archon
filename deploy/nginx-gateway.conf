# Mounted as /etc/nginx/conf.d/default.conf in the official nginx image.
# Upstream: archon-sync-api (Fastify + Mongo). UI uses $archon_web_backend (see included active-web fragment).
map $http_upgrade $connection_upgrade {
    default upgrade;
    ""      close;
}

upstream archon_sync_api {
    server archon-sync-api:4010;
}

# Active UI backend (blue/green): deploy/nginx-active-web.upstream.conf sets
# $archon_web_backend (host:port). Resolver + variable proxy_pass defer DNS to request time so
# nginx still starts when the inactive slot is absent (avoids "host not found in upstream").
# Reload: docker kill -s HUP archon-gateway (not nginx -s reload; pid file empty under daemon off)

server {
    listen 80;
    resolver 127.0.0.11 valid=10s ipv6=off;
    include /etc/nginx/active-web.upstream.conf;
    server_name _;

    client_max_body_size 64m;

    location = /health {
        proxy_pass http://archon_sync_api/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/v1/ {
        proxy_pass http://archon_sync_api/api/v1/;
        proxy_http_version 1.1;
        # WebSocket upgrade: Yjs collab (`/api/v1/ws/yjs/:noteId`), space
        # presence/event WS (`/api/v1/ws/space/:spaceId`), and the MDX-state
        # WS all upgrade through this location. Without these two headers
        # the upgrade is dropped and the client sees a 502 on connect.
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location / {
        proxy_pass http://$archon_web_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
