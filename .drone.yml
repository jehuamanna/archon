# Drone pipelines for Archon (local drone-runner-docker; GitHub as Git + OAuth provider).
# Default: lint + unit tests on push/PR to main.
# Postgres service: sync-api integration tests run instead of skipping.
# Tags v*: same CI gate; full multi-OS releases stay in .github/workflows/release.yml unless you add runners.

kind: pipeline
type: docker
name: ci

trigger:
  event:
    - push
    - pull_request
  branch:
    - main
    - master

services:
  - name: postgres
    image: postgres:16
    environment:
      POSTGRES_USER: archon
      POSTGRES_PASSWORD: archon
      POSTGRES_DB: archon_sync
    ports:
      - 5432

steps:
  - name: install-lint-test
    image: node:22-bookworm
    environment:
      DATABASE_URL: postgres://archon:archon@postgres:5432/archon_sync
    commands:
      - apt-get update && apt-get install -y --no-install-recommends python3 make g++ ca-certificates git
      - sleep 5
      - npm ci
      - npm run lint
      - npm run test

---
kind: pipeline
type: docker
name: verify-tag

trigger:
  event:
    - tag
  ref:
    - refs/tags/v*

services:
  - name: postgres
    image: postgres:16
    environment:
      POSTGRES_USER: archon
      POSTGRES_PASSWORD: archon
      POSTGRES_DB: archon_sync
    ports:
      - 5432

steps:
  - name: install-lint-test
    image: node:22-bookworm
    environment:
      DATABASE_URL: postgres://archon:archon@postgres:5432/archon_sync
    commands:
      - apt-get update && apt-get install -y --no-install-recommends python3 make g++ ca-certificates git
      - sleep 5
      - npm ci
      - npm run lint
      - npm run test
