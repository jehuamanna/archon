# Default stack: archon-sync-api + archon-web-blue + archon-gateway (WPN in Postgres).
# Local Postgres (`postgres`) is opt-in via profile `local-pg` (see ARCHON_LOCAL_PG in scripts).
# See docs/deploy-archon-sync.md
#
# Usage (gateway on host port ARCHON_GATEWAY_PORT, default 8080):
#   npm run docker:api:up
#
# Build sync-api image: npm run docker:api:build
# Detached:        npm run docker:api:up:detached
# Stop:            npm run docker:api:down
# Follow logs:     npm run docker:logs
#
# Unified gateway (nginx, default 8080 — see deploy/ZERO-DOWNTIME.md):
#   - / → Next UI (active archon-web-blue or archon-web-green)
#   - /api/v1/* → archon-sync-api:4010; GET /health → sync-api root probe
#
# Direct sync-api (bypass gateway): http://127.0.0.1:4010/health and http://127.0.0.1:4010/api/v1/…
# Blue/green applies to archon-web only.
#
# Full stack + UI deploy:
#   npm run deploy
#   Open http://127.0.0.1:8080 — WPN in Postgres (local container with --profile local-pg, or set DATABASE_URL for remote).

services:
  postgres:
    profiles: ["local-pg"]
    image: postgres:16
    container_name: archon-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-archon}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-archon}
      POSTGRES_DB: ${POSTGRES_DB:-archon_sync}
    ports:
      - "${ARCHON_POSTGRES_PORT:-5432}:5432"
    volumes:
      - archon-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-archon} -d ${POSTGRES_DB:-archon_sync}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: archon-redis
    restart: unless-stopped
    # Persistence off: Hocuspocus uses Redis only as a pub/sub fanout layer
    # for cross-replica Yjs updates and awareness. The CRDT state of record
    # lives in Postgres (`yjs_state` + `notes.content`); a Redis restart
    # loses nothing durable. AOF + RDB are wasted IO here.
    command: ["redis-server", "--appendonly", "no", "--save", ""]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  archon-sync-api:
    build:
      context: .
      dockerfile: Dockerfile.sync-api
    image: archon-sync-api:local
    container_name: archon-sync-api
    restart: unless-stopped
    ports:
      - "${ARCHON_SYNC_API_PORT:-4010}:4010"
    environment:
      HOST: "0.0.0.0"
      PORT: "4010"
      # Service-discovery URLs are hardcoded to compose-internal hostnames so
      # a host-side `.env` (used by `npm run sync-api:local` for host-mode
      # dev) can't override them with `localhost`/`127.0.0.1`, which is
      # unreachable from inside the container network. Override
      # ARCHON_DATABASE_URL_OVERRIDE / ARCHON_REDIS_URL_OVERRIDE in `.env`
      # to point at managed services instead — these are deliberately
      # different names than the host-mode DATABASE_URL / REDIS_URL.
      DATABASE_URL: ${ARCHON_DATABASE_URL_OVERRIDE:-postgres://archon:archon@postgres:5432/archon_sync}
      REDIS_URL: ${ARCHON_REDIS_URL_OVERRIDE:-redis://redis:6379}
      JWT_SECRET: ${JWT_SECRET:-dev-only-archon-sync-secret-min-32-chars!!}
      ARCHON_REPLICA_ID: ${ARCHON_REPLICA_ID:-archon-sync-1}
      ARCHON_MASTER_ADMIN_EMAIL: ${ARCHON_MASTER_ADMIN_EMAIL:-}
      ARCHON_BUNDLED_DOCS_DIR: /app/docs/bundled-plugin-authoring
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:4010/health',(r)=>{r.resume();r.on('end',()=>process.exit(r.statusCode===200?0:1));}).on('error',()=>process.exit(1));",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 25s

  archon-web-blue:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        NEXT_PUBLIC_ARCHON_API_SAME_ORIGIN: ${NEXT_PUBLIC_ARCHON_API_SAME_ORIGIN:-0}
        NEXT_PUBLIC_ARCHON_WPN_USE_SYNC_API: ${NEXT_PUBLIC_ARCHON_WPN_USE_SYNC_API:-1}
        NEXT_PUBLIC_ARCHON_WEB_BACKEND: ${NEXT_PUBLIC_ARCHON_WEB_BACKEND:-sync-only}
        NEXT_PUBLIC_ARCHON_SYNC_API_URL: ${NEXT_PUBLIC_ARCHON_SYNC_API_URL:-http://127.0.0.1:8080/api/v1}
    image: archon-web:local
    container_name: archon-web-blue
    restart: unless-stopped
    expose:
      - "3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:3000/',(r)=>{let d='';r.on('data',()=>{});r.on('end',()=>process.exit(r.statusCode&&r.statusCode<500?0:1));}).on('error',()=>process.exit(1));",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

  archon-web-green:
    profiles: ["green"]
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        NEXT_PUBLIC_ARCHON_API_SAME_ORIGIN: ${NEXT_PUBLIC_ARCHON_API_SAME_ORIGIN:-0}
        NEXT_PUBLIC_ARCHON_WPN_USE_SYNC_API: ${NEXT_PUBLIC_ARCHON_WPN_USE_SYNC_API:-1}
        NEXT_PUBLIC_ARCHON_WEB_BACKEND: ${NEXT_PUBLIC_ARCHON_WEB_BACKEND:-sync-only}
        NEXT_PUBLIC_ARCHON_SYNC_API_URL: ${NEXT_PUBLIC_ARCHON_SYNC_API_URL:-http://127.0.0.1:8080/api/v1}
    image: archon-web:local
    container_name: archon-web-green
    restart: unless-stopped
    expose:
      - "3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:3000/',(r)=>{r.on('data',()=>{});r.on('end',()=>process.exit(r.statusCode&&r.statusCode<500?0:1));}).on('error',()=>process.exit(1));",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

  archon-gateway:
    image: nginx:1.26-alpine
    container_name: archon-gateway
    restart: unless-stopped
    ports:
      - "${ARCHON_GATEWAY_PORT:-8080}:80"
    volumes:
      - type: bind
        source: ./deploy/nginx-gateway.conf
        target: /etc/nginx/conf.d/default.conf
        read_only: true
      # Outside conf.d/*.conf so nginx does not load this twice (would duplicate upstream).
      - type: bind
        source: ./deploy/nginx-active-web.upstream.conf
        target: /etc/nginx/active-web.upstream.conf
        read_only: false
    depends_on:
      archon-sync-api:
        condition: service_healthy
      archon-web-blue:
        condition: service_healthy

  # Local S3-compatible storage for marketplace publishing dev.
  # Enable with: docker compose --profile marketplace up --build
  minio:
    profiles: ["marketplace"]
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    container_name: archon-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${ARCHON_MARKET_S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${ARCHON_MARKET_S3_SECRET_KEY:-minioadmin}
    volumes:
      - archon-minio-data:/data

volumes:
  archon-minio-data:
  archon-postgres-data:
